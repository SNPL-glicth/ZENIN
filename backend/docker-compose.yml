version: '3.8'

# ZENIN uses the existing SQL Server container (port 1434) from the IoT stack.
# Only Redis and the API are managed here.

services:
  redis:
    image: redis:7-alpine
    container_name: zenin-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zenin-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=host.docker.internal,1434;Database=zenin_db;User Id=sa;Password=Sandevistan2510;TrustServerCertificate=True
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Secret=YourSuperSecretKeyThatIsAtLeast32CharactersLong!
      - Jwt__Issuer=ZeninAPI
      - Jwt__Audience=ZeninClient
      - Jwt__ExpiryMinutes=60
      - Cors__AllowedOrigins=http://localhost:5173,http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
